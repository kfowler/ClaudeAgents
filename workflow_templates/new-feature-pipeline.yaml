id: "new-feature-pipeline"
name: "New Feature Development Pipeline"
description: "Comprehensive workflow for developing new features from strategy to production-ready implementation"
version: "1.0"
author: "Claude Code Workflow Engine"
created_at: "2025-01-08"

metadata:
  category: "development"
  complexity: "medium"
  estimated_duration: 3600  # 1 hour
  suitable_for: ["web applications", "mobile apps", "APIs"]
  prerequisites: ["requirements gathered", "design approved"]

global_parameters:
  feature_name: "New Feature"
  target_environment: "production"
  quality_gate_enabled: true
  security_scan_required: true
  accessibility_compliance: "WCAG 2.1 AA"

hooks:
  pre_workflow:
    - "validate_prerequisites"
    - "setup_feature_branch"
  post_workflow:
    - "cleanup_temporary_files"
    - "send_completion_notification"

tasks:
  - id: "strategy_analysis"
    name: "Product Strategy Analysis"
    agent: "product-strategist"
    description: "Analyze feature requirements and validate market fit"
    parameters:
      analysis_scope: "feature_validation"
      market_research: true
      competitive_analysis: true
      user_persona_mapping: true
    execution_mode: "sequential"
    timeout: 600
    max_retries: 2
    hooks:
      post_task:
        - "validate_strategy_output"
        - "update_project_documentation"

  - id: "architecture_design"
    name: "Technical Architecture Design"
    agent: "full-stack-architect"
    description: "Design technical architecture for the new feature"
    dependencies:
      - "strategy_analysis"
    parameters:
      design_scope: "feature_architecture"
      technology_stack_validation: true
      scalability_planning: true
      integration_planning: true
    execution_mode: "sequential"
    timeout: 900
    max_retries: 2
    conditions:
      previous_task_status:
        task_id: "strategy_analysis"
        status: "completed"

  - id: "security_review"
    name: "Security Architecture Review"
    agent: "security-audit-specialist"
    description: "Review feature design for security implications"
    dependencies:
      - "architecture_design"
    parameters:
      review_scope: "design_phase"
      threat_modeling: true
      compliance_check: true
      data_protection_analysis: true
    execution_mode: "parallel"
    timeout: 600
    max_retries: 1
    conditions:
      global_context:
        key: "security_scan_required"
        value: true

  - id: "test_strategy"
    name: "Test Strategy Development"
    agent: "qa-test-engineer"
    description: "Develop comprehensive testing strategy for the feature"
    dependencies:
      - "architecture_design"
    parameters:
      strategy_scope: "feature_testing"
      test_types: ["unit", "integration", "e2e", "performance"]
      automation_planning: true
      test_data_planning: true
    execution_mode: "parallel"
    timeout: 600
    max_retries: 2

  - id: "implementation"
    name: "Feature Implementation"
    agent: "full-stack-architect"
    description: "Implement the feature based on approved architecture"
    dependencies:
      - "security_review"
      - "test_strategy"
    parameters:
      implementation_scope: "full_feature"
      code_quality_standards: "high"
      documentation_required: true
      performance_optimization: true
    execution_mode: "sequential"
    timeout: 1800
    max_retries: 1
    hooks:
      pre_task:
        - "create_feature_branch"
        - "setup_development_environment"
      post_task:
        - "run_code_quality_checks"
        - "update_code_documentation"

  - id: "test_implementation"
    name: "Test Suite Implementation"
    agent: "qa-test-engineer"
    description: "Implement comprehensive test suite for the feature"
    dependencies:
      - "implementation"
    parameters:
      test_implementation_scope: "comprehensive"
      coverage_target: 90
      performance_tests: true
      security_tests: true
    execution_mode: "sequential"
    timeout: 900
    max_retries: 2

  - id: "accessibility_audit"
    name: "Accessibility Compliance Audit"
    agent: "accessibility-expert"
    description: "Ensure feature meets accessibility standards"
    dependencies:
      - "implementation"
    parameters:
      compliance_level: "WCAG_2_1_AA"
      automated_testing: true
      manual_testing: true
      screen_reader_testing: true
    execution_mode: "parallel"
    timeout: 600
    max_retries: 1
    conditions:
      global_context:
        key: "accessibility_compliance"
        value: "WCAG 2.1 AA"

  - id: "performance_optimization"
    name: "Performance Analysis and Optimization"
    agent: "systems-engineer"
    description: "Analyze and optimize feature performance"
    dependencies:
      - "test_implementation"
    parameters:
      optimization_scope: "feature_performance"
      benchmarking: true
      profiling: true
      memory_analysis: true
    execution_mode: "sequential"
    timeout: 900
    max_retries: 2

  - id: "final_security_scan"
    name: "Final Security Vulnerability Scan"
    agent: "security-audit-specialist"
    description: "Comprehensive security scan of implemented feature"
    dependencies:
      - "performance_optimization"
      - "accessibility_audit"
    parameters:
      scan_scope: "implementation_phase"
      vulnerability_scanning: true
      penetration_testing: false
      compliance_validation: true
    execution_mode: "sequential"
    timeout: 600
    max_retries: 1

  - id: "quality_gate_validation"
    name: "Quality Gate Validation"
    agent: "qa-test-engineer"
    description: "Final validation that feature meets all quality criteria"
    dependencies:
      - "final_security_scan"
    parameters:
      validation_scope: "comprehensive"
      quality_metrics_check: true
      regression_testing: true
      user_acceptance_criteria: true
    execution_mode: "sequential"
    timeout: 600
    max_retries: 1
    conditions:
      global_context:
        key: "quality_gate_enabled"
        value: true

  - id: "deployment_preparation"
    name: "Production Deployment Preparation"
    agent: "devops-engineer"
    description: "Prepare feature for production deployment"
    dependencies:
      - "quality_gate_validation"
    parameters:
      deployment_scope: "production_ready"
      ci_cd_pipeline_update: true
      monitoring_setup: true
      rollback_planning: true
    execution_mode: "sequential"
    timeout: 600
    max_retries: 2
    hooks:
      post_task:
        - "validate_deployment_readiness"
        - "create_deployment_checklist"