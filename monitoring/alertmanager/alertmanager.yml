# AlertManager Configuration for Claude Agents
# Enterprise-grade alerting with routing, inhibition, and notification channels

global:
  smtp_smarthost: 'smtp.example.com:587'
  smtp_from: 'alerts@claude-agents.com'
  smtp_auth_username: 'alerts@claude-agents.com'
  smtp_auth_password: 'smtp_password'
  smtp_require_tls: true
  
  slack_api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
  
  pagerduty_url: 'https://events.pagerduty.com/v2/enqueue'
  
  # Resolve timeout for alerts
  resolve_timeout: 5m

# Routing tree
route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 12h
  receiver: 'default-receiver'
  
  routes:
    # Critical alerts go to PagerDuty and Slack immediately
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 10s
      group_interval: 5m
      repeat_interval: 1h
      
    # Warning alerts go to Slack during business hours
    - match:
        severity: warning
      receiver: 'warning-alerts'
      group_wait: 30s
      group_interval: 10m
      repeat_interval: 4h
      active_time_intervals:
        - business-hours
      
    # Security alerts go to security team immediately
    - match:
        team: security
      receiver: 'security-alerts'
      group_wait: 5s
      group_interval: 2m
      repeat_interval: 30m
      
    # Infrastructure alerts go to infra team
    - match:
        team: infrastructure
      receiver: 'infrastructure-alerts'
      group_wait: 15s
      group_interval: 5m
      repeat_interval: 2h
      
    # Database alerts
    - match_re:
        service: 'postgresql|redis'
      receiver: 'database-alerts'
      group_wait: 10s
      group_interval: 5m
      repeat_interval: 1h
      
    # Application alerts
    - match_re:
        service: 'orchestrator|agent-recommender|learning-system|semantic-agent|analytics|workflows'
      receiver: 'application-alerts'
      group_wait: 15s
      group_interval: 10m
      repeat_interval: 2h

# Inhibition rules - suppress noisy alerts when more important ones are firing
inhibit_rules:
  # Suppress warning alerts when critical alerts are firing for the same service
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['service', 'instance']
    
  # Suppress individual service alerts when the entire node is down
  - source_match:
      alertname: 'KubernetesNodeNotReady'
    target_match_re:
      alertname: 'ServiceDown|HighErrorRate|HighLatency'
    equal: ['instance']
    
  # Suppress individual alerts when the entire cluster has issues
  - source_match:
      alertname: 'KubernetesAPIServerDown'
    target_match_re:
      alertname: '.*'
    equal: ['cluster']
    
  # Suppress memory alerts when pod is crash looping
  - source_match:
      alertname: 'KubernetesPodCrashLooping'
    target_match:
      alertname: 'ServiceHighMemoryUsage'
    equal: ['pod', 'namespace']

# Time intervals for routing
time_intervals:
  - name: business-hours
    time_intervals:
      - times:
          - start_time: '09:00'
            end_time: '17:00'
        weekdays: ['monday:friday']
        location: 'America/Los_Angeles'
        
  - name: after-hours
    time_intervals:
      - times:
          - start_time: '17:01'
            end_time: '08:59'
        weekdays: ['monday:friday']
        location: 'America/Los_Angeles'
      - times:
          - start_time: '00:00'
            end_time: '23:59'
        weekdays: ['saturday', 'sunday']
        location: 'America/Los_Angeles'

# Receivers - notification destinations
receivers:
  - name: 'default-receiver'
    slack_configs:
      - api_url: '{{ .slack_api_url }}'
        channel: '#alerts-default'
        title: 'Default Alert - {{ .GroupLabels.alertname }}'
        text: 'Summary: {{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
        send_resolved: true
        
  - name: 'critical-alerts'
    pagerduty_configs:
      - routing_key: 'YOUR_PAGERDUTY_INTEGRATION_KEY'
        description: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
        severity: 'critical'
        details:
          alertname: '{{ .GroupLabels.alertname }}'
          cluster: '{{ .GroupLabels.cluster }}'
          service: '{{ .GroupLabels.service }}'
        links:
          - href: '{{ range .Alerts }}{{ .Annotations.runbook_url }}{{ end }}'
            text: 'Runbook'
    slack_configs:
      - api_url: '{{ .slack_api_url }}'
        channel: '#alerts-critical'
        color: 'danger'
        title: '🚨 CRITICAL ALERT: {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Service:* {{ .Labels.service }}
          *Instance:* {{ .Labels.instance }}
          *Runbook:* {{ .Annotations.runbook_url }}
          {{ end }}
        send_resolved: true
    email_configs:
      - to: 'oncall@claude-agents.com'
        subject: '🚨 CRITICAL: {{ .GroupLabels.alertname }} - {{ .GroupLabels.service }}'
        body: |
          Critical alert fired:
          
          {{ range .Alerts }}
          Alert: {{ .Labels.alertname }}
          Service: {{ .Labels.service }}
          Instance: {{ .Labels.instance }}
          Summary: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Runbook: {{ .Annotations.runbook_url }}
          {{ end }}
        
  - name: 'warning-alerts'
    slack_configs:
      - api_url: '{{ .slack_api_url }}'
        channel: '#alerts-warning'
        color: 'warning'
        title: '⚠️ WARNING: {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Summary:* {{ .Annotations.summary }}
          *Service:* {{ .Labels.service }}
          *Instance:* {{ .Labels.instance }}
          {{ end }}
        send_resolved: true
        
  - name: 'security-alerts'
    pagerduty_configs:
      - routing_key: 'YOUR_SECURITY_PAGERDUTY_KEY'
        description: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
        severity: 'error'
    slack_configs:
      - api_url: '{{ .slack_api_url }}'
        channel: '#security-alerts'
        color: 'danger'
        title: '🔒 SECURITY ALERT: {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Service:* {{ .Labels.service }}
          {{ end }}
        send_resolved: true
    email_configs:
      - to: 'security@claude-agents.com'
        subject: '🔒 SECURITY ALERT: {{ .GroupLabels.alertname }}'
        body: |
          Security alert detected:
          
          {{ range .Alerts }}
          Alert: {{ .Labels.alertname }}
          Summary: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          {{ end }}
        
  - name: 'infrastructure-alerts'
    slack_configs:
      - api_url: '{{ .slack_api_url }}'
        channel: '#infrastructure-alerts'
        color: '#ff9900'
        title: '🏗️ INFRASTRUCTURE: {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Summary:* {{ .Annotations.summary }}
          *Node/Instance:* {{ .Labels.instance }}{{ .Labels.nodename }}
          {{ end }}
        send_resolved: true
    email_configs:
      - to: 'infrastructure@claude-agents.com'
        subject: '🏗️ Infrastructure Alert: {{ .GroupLabels.alertname }}'
        
  - name: 'database-alerts'
    slack_configs:
      - api_url: '{{ .slack_api_url }}'
        channel: '#database-alerts'
        color: '#0066cc'
        title: '🗄️ DATABASE: {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Summary:* {{ .Annotations.summary }}
          *Database:* {{ .Labels.service }}
          *Instance:* {{ .Labels.instance }}
          {{ end }}
        send_resolved: true
    email_configs:
      - to: 'database-team@claude-agents.com'
        subject: '🗄️ Database Alert: {{ .GroupLabels.alertname }}'
        
  - name: 'application-alerts'
    slack_configs:
      - api_url: '{{ .slack_api_url }}'
        channel: '#application-alerts'
        color: 'good'
        title: '🚀 APPLICATION: {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Summary:* {{ .Annotations.summary }}
          *Service:* {{ .Labels.service }}
          *Pod:* {{ .Labels.pod }}
          {{ end }}
        send_resolved: true

# Templates for customizing notifications
templates:
  - '/etc/alertmanager/templates/*.tmpl'