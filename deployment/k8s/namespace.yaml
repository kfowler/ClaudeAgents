apiVersion: v1
kind: Namespace
metadata:
  name: claude-agents
  labels:
    name: claude-agents
    environment: production
    app.kubernetes.io/name: claude-agents
    app.kubernetes.io/component: system
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: claude-agents-quota
  namespace: claude-agents
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    persistentvolumeclaims: "10"
    secrets: "20"
    configmaps: "20"
    services: "10"
    count/deployments.apps: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: claude-agents-limits
  namespace: claude-agents
spec:
  limits:
  - default:
      cpu: 500m
      memory: 512Mi
    defaultRequest:
      cpu: 100m
      memory: 128Mi
    type: Container
  - default:
      storage: 10Gi
    type: PersistentVolumeClaim