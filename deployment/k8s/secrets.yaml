# Application Secrets Template
# IMPORTANT: This file contains template values that MUST be updated with real secrets before deployment
# Use tools like Sealed Secrets, External Secrets Operator, or Kubernetes secrets management

apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: claude-agents
  annotations:
    # Add rotation policy annotations
    secret.kubernetes.io/rotate: "quarterly"
    secret.kubernetes.io/last-rotation: "2024-01-01"
type: Opaque
data:
  # Database connection string - MUST be updated with real credentials
  # Format: postgresql://username:password@hostname:port/database
  # echo -n 'postgresql://claude:REAL_PASSWORD@postgres:5432/claude_agents' | base64
  database-url: cG9zdGdyZXNxbDovL2NsYXVkZTpSRUFMX1BBU1NXT1JEQHBvc3RncmVzOjU0MzIvY2xhdWRlX2FnZW50cw==
  
  # JWT secret for authentication - MUST be a strong random secret
  # openssl rand -base64 32 | base64
  jwt-secret: WW91ck5ld1NlY3JldEtleUhlcmU=
  
  # Redis password - MUST match redis deployment
  # echo -n 'REAL_REDIS_PASSWORD' | base64
  redis-password: UkVBTF9SRURJU19QQVNTV09SRA==
  
  # API keys for external services (if needed)
  # echo -n 'your_api_key' | base64
  openai-api-key: eW91cl9vcGVuYWlfYXBpX2tleQ==
  anthropic-api-key: eW91cl9hbnRocm9waWNfYXBpX2tleQ==
  
  # Encryption keys for sensitive data
  # openssl rand -base64 32 | base64
  data-encryption-key: WW91ckVuY3J5cHRpb25LZXlIZXJl

---
apiVersion: v1
kind: Secret
metadata:
  name: monitoring-secrets
  namespace: claude-agents
type: Opaque
data:
  # Grafana admin credentials
  # echo -n 'admin_username' | base64
  grafana-admin-user: YWRtaW5fdXNlcm5hbWU=
  # echo -n 'SECURE_ADMIN_PASSWORD' | base64
  grafana-admin-password: U0VDVVJFX0FETUlOX1BBU1NXT1JE
  
  # Prometheus basic auth (if enabled)
  # echo -n 'prometheus_user' | base64
  prometheus-user: cHJvbWV0aGV1c191c2Vy
  # echo -n 'PROMETHEUS_PASSWORD' | base64
  prometheus-password: UFJPTUVUSEVVU19QQVNTV09SRA==

---
# TLS Secret for HTTPS termination
# This should be created using cert-manager or manually with real certificates
apiVersion: v1
kind: Secret
metadata:
  name: tls-secret
  namespace: claude-agents
  annotations:
    cert-manager.io/issuer: "letsencrypt-prod"
type: kubernetes.io/tls
data:
  # Base64 encoded certificate and private key
  # These should be real TLS certificates in production
  tls.crt: LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0t...
  tls.key: LS0tLS1CRUdJTiBQUklWQVRFIEtFWS0tLS0t...

---
# Docker registry secret for pulling private images
apiVersion: v1
kind: Secret
metadata:
  name: registry-secret
  namespace: claude-agents
type: kubernetes.io/dockerconfigjson
data:
  # Create with: kubectl create secret docker-registry registry-secret --docker-server=DOCKER_REGISTRY_SERVER --docker-username=DOCKER_USER --docker-password=DOCKER_PASSWORD --docker-email=DOCKER_EMAIL
  .dockerconfigjson: eyJhdXRocyI6eyJyZWdpc3RyeS5leGFtcGxlLmNvbSI6eyJ1c2VybmFtZSI6InVzZXIiLCJwYXNzd29yZCI6InBhc3MiLCJlbWFpbCI6InVzZXJAZXhhbXBsZS5jb20iLCJhdXRoIjoiZFhObGNqcHdZWE56In19fQ==