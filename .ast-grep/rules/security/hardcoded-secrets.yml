# yaml-language-server: $schema=https://raw.githubusercontent.com/ast-grep/ast-grep/main/schemas/rule.json

id: security-no-hardcoded-secrets
message: Potential hardcoded secret detected - use environment variables
severity: error
language: TypeScript
rule:
  any:
    - pattern: const $VAR = "$SECRET"
    - pattern: $VAR = "$SECRET"
note: |
  Never hardcode secrets. Use environment variables instead.
  Fix: const apiKey = process.env.API_KEY

  Detected patterns: password, secret, api_key, apikey, token, jwt, private_key, privatekey
