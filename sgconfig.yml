# ast-grep configuration for StartupStack
# This file allows running `ast-grep scan` from project root
# Actual configuration is in .ast-grep/sgconfig.yml

# Rule directories
ruleDirs:
  - .ast-grep/rules

# Language configurations
languageGlobs:
  typescript:
    - "**/*.ts"
    - "**/*.tsx"
  javascript:
    - "**/*.js"
    - "**/*.jsx"
    - "**/*.mjs"
  html:
    - "**/*.svelte"
    - "**/*.html"
  css:
    - "**/*.css"
  yaml:
    - "**/*.yml"
    - "**/*.yaml"
  json:
    - "**/*.json"

# Paths to ignore during scanning
ignore:
  - "node_modules/**"
  - ".git/**"
  - "dist/**"
  - "build/**"
  - ".svelte-kit/**"
  - "**/*.min.js"
  - "**/*.bundle.js"
  - "coverage/**"
  - ".next/**"
  - ".cache/**"
  - "*.log"

# Test directory for ast-grep test command
testConfigs:
  - testDir: .ast-grep/test

# Output configuration
outputStyle: rich
