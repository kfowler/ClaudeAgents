apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestration-engine
  labels:
    app: orchestration-engine
    version: v1.0.0
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: orchestration-engine
  template:
    metadata:
      labels:
        app: orchestration-engine
        version: v1.0.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: orchestration-engine
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: orchestration-engine
        image: claude/orchestration-engine:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        - containerPort: 9090
          name: metrics
          protocol: TCP
        env:
        - name: RUST_LOG
          value: "info"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: orchestration-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: orchestration-secrets
              key: redis-url
        - name: RABBITMQ_URL
          valueFrom:
            secretKeyRef:
              name: orchestration-secrets
              key: rabbitmq-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: orchestration-secrets
              key: jwt-secret
        volumeMounts:
        - name: config
          mountPath: /app/config.toml
          subPath: config.toml
        - name: logs
          mountPath: /app/logs
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 15"]
      volumes:
      - name: config
        configMap:
          name: orchestration-config
      - name: logs
        emptyDir: {}
      terminationGracePeriodSeconds: 30
      
---
apiVersion: v1
kind: Service
metadata:
  name: orchestration-engine-service
  labels:
    app: orchestration-engine
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: metrics
  selector:
    app: orchestration-engine

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: orchestration-engine
  labels:
    app: orchestration-engine

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: orchestration-engine
rules:
- apiGroups: [""]
  resources: ["pods", "services", "endpoints"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["metrics.k8s.io"]
  resources: ["*"]
  verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: orchestration-engine
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: orchestration-engine
subjects:
- kind: ServiceAccount
  name: orchestration-engine
  namespace: default

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: orchestration-config
data:
  config.toml: |
    [server]
    host = "0.0.0.0"
    port = 8080
    worker_threads = 4
    max_connections = 5000
    request_timeout_ms = 30000
    keepalive_timeout_ms = 5000

    [database]
    url = "postgresql://orchestration:${DATABASE_PASSWORD}@postgres-service:5432/orchestration"
    max_connections = 50
    min_connections = 5
    acquire_timeout_ms = 5000
    idle_timeout_ms = 300000
    migrate_on_startup = true

    [redis]
    urls = ["redis://redis-service:6379"]
    pool_size = 25
    timeout_ms = 5000
    retry_attempts = 3
    cluster_mode = false

    [message_queue]
    rabbitmq_url = "amqp://orchestration:${RABBITMQ_PASSWORD}@rabbitmq-service:5672"
    default_queue = "orchestration"
    prefetch_count = 10
    ack_timeout_ms = 30000

    [orchestration]
    max_concurrent_tasks = 500
    task_timeout_ms = 300000
    agent_startup_timeout_ms = 10000
    heartbeat_interval_ms = 5000
    load_balancing_strategy = "AdaptiveLoad"
    conflict_resolution_strategy = "WeightedVoting"

    [orchestration.resource_limits]
    max_memory_mb = 1024
    max_cpu_cores = 2.0
    max_tokens_per_minute = 50000
    max_agents_per_task = 8
    max_context_size_mb = 50

    [monitoring]
    prometheus_endpoint = "0.0.0.0:9090"
    log_level = "info"
    metrics_interval_ms = 10000
    health_check_interval_ms = 30000
    performance_profiling = false

    [security]
    jwt_secret = "${JWT_SECRET}"
    jwt_expiry_hours = 24
    cors_origins = ["*"]
    tls_enabled = false

